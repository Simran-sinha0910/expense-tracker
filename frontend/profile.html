<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { background: #F8FAFC; font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 6px rgba(17, 24, 39, 0.06); }
    .navbar-glass { background: rgba(255,255,255,0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(15,23,42,0.06); }
    .brand-text { background: linear-gradient(135deg, #111827, #374151); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #0ea5e9, #10b981); border: none; }
    .form-label { font-weight: 600; color: #475569; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
        <i class="fa-solid fa-wallet me-2" style="color:#10B981"></i>
        <span class="brand-text">Expense Tracker</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarsMain">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><button class="btn btn-outline-secondary btn-sm" onclick="logout()">Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 fw-bold" style="color:#1E293B">My Profile</h4>
            <span class="badge text-bg-light" id="profileMeta"></span>
          </div>

          <div id="profileAlert" class="alert d-none" role="alert"></div>

          <div class="mb-3">
            <label for="profName" class="form-label">Name</label>
            <input type="text" id="profName" class="form-control" placeholder="Your name">
          </div>
          <div class="mb-3">
            <label for="profEmail" class="form-label">Email</label>
            <input type="email" id="profEmail" class="form-control" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="profPassword" class="form-label">Password</label>
            <input type="password" id="profPassword" class="form-control" placeholder="Leave blank to keep unchanged">
            <div class="form-text">For security, enter a new password only if you want to change it.</div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="updateProfile()"><i class="fa-solid fa-floppy-disk me-1"></i>Save Changes</button>
            <a href="dashboard.html" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
