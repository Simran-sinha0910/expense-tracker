<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Expense</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h2 class="mb-3">Add Expense</h2>
  <div class="card p-3 mx-auto" style="max-width: 400px;">
    <input id="desc" class="form-control mb-2" placeholder="Description">
    <input id="type" class="form-control mb-2" placeholder="Type (Food, Travel)">
    <input id="amount" class="form-control mb-2" type="number" placeholder="Amount">
    <input id="details" class="form-control mb-2" placeholder="Details">
    <label for="date" class="form-label">Date</label>
    <input id="date" class="form-control mb-3" type="date">
    <button type="button" onclick="addExpense()" class="btn btn-success w-100">Save</button>
  </div>

  <script src="js/expenses.js"></script>
</body>
</html>
